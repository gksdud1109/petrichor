spring:
  application:
    name: petrichor-backend
  mvc:
    problemdetails:
      enabled: true   # MethodArgumentNotValidException/HandlerMethodValidationException → RFC7807 problem+json
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/petrichor}
    username: ${DB_USERNAME:petrichor}
    password: ${DB_PASSWORD:petrichor}
  jpa:
    hibernate:
      ddl-auto: validate          # 스키마 소유권은 Flyway. 엔티티-스키마 불일치 시 부팅 실패로 조기 검출
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_APP_PORT:6379}

# 레이트리밋(in-memory per-IP token bucket; /api/v1/** 적용, actuator 제외)
petrichor:
  ratelimit:
    capacity: 120
    refill-tokens: 120
    refill-period-seconds: 60
    trust-forwarded-for: false   # 신뢰 프록시 뒤에서만 true로 설정(기본 off — XFF 위조 우회 차단)
  # 오브젝트 스토리지(S3/MinIO/R2). .env(S3_*)와 정합. 비공개 버킷 + 짧은 presign 전제.
  storage:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}   # MinIO 로컬 기본; R2/S3는 env로 주입
    region: ${S3_REGION:us-east-1}
    access-key: ${S3_ACCESS_KEY:petrichor}
    secret-key: ${S3_SECRET_KEY:petrichor-secret}
    bucket: ${S3_BUCKET:petrichor-media}
    presign-ttl-seconds: ${S3_PRESIGN_TTL_SECONDS:600}   # 다운로드/업로드 서명 만료(기본 10분)

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true              # /actuator/health/liveness, /readiness
  health:
    db:
      enabled: true
    redis:
      enabled: true

info:
  app:
    name: Petrichor Backend
    phase: "1"
