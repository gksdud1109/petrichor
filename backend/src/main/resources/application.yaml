spring:
  application:
    name: petrichor-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/petrichor}
    username: ${DB_USERNAME:petrichor}
    password: ${DB_PASSWORD:petrichor}
  jpa:
    hibernate:
      ddl-auto: validate          # 스키마 소유권은 Flyway. 엔티티-스키마 불일치 시 부팅 실패로 조기 검출
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_APP_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true              # /actuator/health/liveness, /readiness
  health:
    db:
      enabled: true
    redis:
      enabled: true

info:
  app:
    name: Petrichor Backend
    phase: "0"
